# Pin the "USB2.0 Device" (motherboard-internal Intel-vendor USB audio
# chip) to its S/PDIF optical output profile so the EQ filter-chain has
# a stable iec958-stereo sink to target. Without auto-profile=false,
# WirePlumber may switch it back to analog-stereo when (un)plugging USB
# devices. The actual profile selection is set once at autostart via
# `pactl set-card-profile` in ~/.local/src/dwl/autostart.sh.

monitor.alsa.rules = [
  {
    matches = [
      { device.name = "alsa_card.usb-Generic_USB2.0_Device_20170726905923-00" }
    ]
    actions = {
      update-props = {
        api.acp.auto-profile = false
      }
    }
  }
]
