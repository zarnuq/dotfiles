# 16-band parametric EQ via PipeWire's builtin filter-chain — one instance
# per hardware output. Mirrors ~/.local/share/easyeffects/output/EQ.json.
#
# Two sinks are created:
#   effect_input.eq_fiio     -> alsa_output.usb-FIIO_FiiO_K11-01.iec958-stereo
#   effect_input.eq_optical  -> alsa_output.usb-Generic_USB2.0_Device_20170726905923-00.iec958-stereo
#
# Each filter-chain's playback side is pinned with target.object to the
# specific hardware sink, so the EQ applies regardless of which sink is
# default. Use ~/.local/bin/flip.sh to cycle which EQ sink is the default
# (apps then connect there and get EQ'd before reaching hardware).
#
# All bands: type=Bell (bq_peaking), Q=2.3521, mode=APO(DR). split-channels
# was false in the easyeffects preset, so L and R use identical controls.
# Both EQ instances share the same coefficients — keep them in sync if you
# regenerate the curve.
#
# To verify after pipewire restart:
#   wpctl status | grep -E "effect_input\.eq_(fiio|optical)"
#   pw-link -l | grep effect_output

