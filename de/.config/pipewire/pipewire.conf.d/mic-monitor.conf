# Mic monitoring (sidetone) for the TONOR TC30.
# Loops the mic source into a virtual sink you route to your headphones so
# you hear yourself. The loopback is created but starts DISABLED (node.autoconnect
# off + a control sink you toggle), so it does NOT auto-blast your speakers.
#
# Usage:
#   - The loopback capture end is pinned to the TONOR TC30 mic (target.object).
#   - The playback end follows the default sink; to only monitor in headphones
#     switch the "Mic Monitor" stream's output in pavucontrol / wpctl.
#   - Mute/adjust the monitor level via the "Mic Monitor" playback stream.
#
# Verify: wpctl status | grep -i "Mic Monitor"

context.modules = [
    {   name = libpipewire-module-loopback
        args = {
            node.description = "Mic Monitor"
            capture.props = {
                node.name    = "capture.mic_monitor"
                node.passive = true
                media.class  = "Stream/Input/Audio"
                # Pin capture to the TONOR TC30 mic
                target.object = "alsa_input.usb-FuZhou_Kingwayinfo_CO._LTD_TONOR_TC30_Audio_Device_20200707-00.mono-fallback"
                stream.dont-remix = true
            }
            playback.props = {
                node.name    = "playback.mic_monitor"
                node.description = "Mic Monitor"
                media.class  = "Stream/Output/Audio"
                # Leave target unset -> follows the default sink (your headphones EQ sink).
                # Start muted so enabling monitoring is an explicit choice.
                channelmix.normalize = false
                audio.channels = 2
                # Do NOT auto-route to a sink: prevents speaker feedback on login.
                # Enable monitoring by linking "Mic Monitor" to your headphones in
                # pavucontrol (Playback tab) or: pw-link playback.mic_monitor <sink>
                node.autoconnect = false
            }
        }
    }
]
